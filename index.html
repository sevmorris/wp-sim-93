<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL2601</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Phosphor green palette ─────────────────────────────────────────────── */
    :root {
      --amber:    #33ff33;   /* normal output       */
      --amber-hi: #99ff99;   /* bright / prompts    */
      --amber-lo: #1a6b1a;   /* dim / system msgs   */
      --amber-bg: #000000;
      --amber-border: #228822;
    }

    html, body {
      background: var(--amber-bg);
      color: var(--amber);
      font-family: 'VT323', 'Courier New', Courier, monospace;
      font-size: 24px;
      line-height: 1.45;
      height: 100%;
      overflow: hidden;
    }

    /* ── Outer layout ───────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* ── Status panel ───────────────────────────────────────────────────────── */
    #panel {
      flex-shrink: 0;
      padding: 4px 8px;
      border-bottom: 1px solid var(--amber-border);
      white-space: pre;
      overflow: hidden;
      color: var(--amber-hi);
      line-height: 1.5;
      user-select: none;
    }
    #panel .dim  { color: var(--amber-lo); }
    #panel .norm { color: var(--amber); }

    /* ── Scrollable output ──────────────────────────────────────────────────── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 4px;
      scroll-behavior: smooth;
    }

    .line {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 1.5em;
    }
    .line.dim   { color: var(--amber-lo); }
    .line.hi    { color: var(--amber-hi); }
    .line.err   { color: #cc4400; }
    .line.white { color: #ffffff; }

    /* ── Input row ──────────────────────────────────────────────────────────── */
    #input-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 4px 12px 8px;
      border-top: 1px solid var(--amber-lo);
    }

    #prompt {
      color: var(--amber-hi);
      white-space: pre;
      user-select: none;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--amber);
      font-family: inherit;
      font-size: inherit;
      caret-color: var(--amber-hi);
      padding: 0 0 0 2px;
    }

    /* hide the password field visually but keep it readable by screenreaders */
    #cmd-input[data-mode="password"] {
      -webkit-text-security: disc;
      text-security: disc;
    }

    /* ── Blinking cursor ────────────────────────────────────────────────────── */
    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100%{ opacity: 0; }
    }
    .cursor::after {
      content: '█';
      animation: blink 1s step-end infinite;
      color: var(--amber-hi);
    }

    /* ── Scrollbar ──────────────────────────────────────────────────────────── */
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #111; }
    #output::-webkit-scrollbar-thumb { background: var(--amber-lo); border-radius: 3px; }

    /* ── Mobile ─────────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      html, body { font-size: 15px; }
      #output     { padding: 6px 8px 4px; }
      #input-row  { padding: 4px 8px 6px; }
      #panel      { padding: 4px 6px; }
    }

    /* ── Letter overlay (floppy letter) ─────────────────────────────────────── */
    #crt-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: default;
    }
    #crt-overlay.visible { opacity: 1; }

    #crt-screen {
      position: relative; z-index: 2;
      max-width: 860px; width: 92%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 3rem 3.5rem;
      background: #faf9f7;
      border-radius: 2px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.55);
      font-family: 'Lora', Georgia, serif;
      font-size: 17px;
      line-height: 1.85;
      color: #1a1a1a;
      scrollbar-width: thin;
      scrollbar-color: #ccc transparent;
    }
    #crt-screen::-webkit-scrollbar       { width: 4px; }
    #crt-screen::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    #crt-bar {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      color: #999;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    #crt-body {
      white-space: pre-wrap;
    }
    #crt-foot {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      color: #aaa;
      border-top: 1px solid #e0e0e0;
      margin-top: 2.5rem;
      padding-top: 0.75rem;
      text-align: center;
    }
    #crt-foot .cursor::after { color: #aaa; }

    @media (max-width: 600px) {
      #crt-screen { padding: 2rem 1.5rem; font-size: 15px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="panel"></div>
  <div id="output"></div>
  <div id="input-row">
    <span id="prompt"></span>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false" aria-label="terminal input">
  </div>
</div>

<div id="crt-overlay">
  <div id="crt-screen">
    <div id="crt-bar"></div>
    <div id="crt-body"></div>
    <div id="crt-foot">[ PRESS ANY KEY ]<span class="cursor"></span></div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════════════════
// Context Awareness Layer
// ═══════════════════════════════════════════════════════════════════════════
//
// ContextManager  —  ActionHistory + FocusStack + pronoun resolution,
//   contextual disambiguation, and auto-navigation.
//
//   Design: additive layer over the existing engine. Existing globals
//   (lastItem, lastScenery, playerArea …) remain authoritative and are
//   kept in sync by setFocus(). All existing verb functions work unchanged.
//
// GameState  —  single observable facade over the global flag variables.
//   Existing code reads/writes globals directly; new code may use GameState.*
//   for a clean, named entry-point without a mass-rename of 200+ references.
// ─────────────────────────────────────────────────────────────────────────

const ContextManager = (() => {

  // ── ActionHistory ─────────────────────────────────────────────────────────
  // Stores the last N structured intents so disambiguation can consult
  // several turns of behaviour rather than just the single previous command.
  // Entry shape: { verb, object, area, ts }
  const HISTORY_MAX   = 10;
  const actionHistory = [];

  function pushHistory(intent) {
    actionHistory.push({ ...intent, ts: Date.now() });
    if (actionHistory.length > HISTORY_MAX) actionHistory.shift();
  }

  // ── FocusStack ────────────────────────────────────────────────────────────
  // Ordered list of recently-focused entities (most recent first).
  // Entry shape: { id, type ('item'|'scenery'), children: [id,…], ts }
  //
  // 'children' captures co-visible items when a container/scenery is examined.
  // e.g. examining the desk pushes { id:'desk', children:['billboard','floppy',…] }
  // so "take it" can resolve to the most contextually appropriate child rather
  // than whatever happened to be mentioned in the previous sentence.
  const FOCUS_MAX  = 8;
  const focusStack = [];

  function setFocus(id, type = 'item', children = []) {
    const idx = focusStack.findIndex(f => f.id === id);
    if (idx !== -1) focusStack.splice(idx, 1);
    focusStack.unshift({ id, type, children, ts: Date.now() });
    if (focusStack.length > FOCUS_MAX) focusStack.pop();
    // Keep legacy globals in sync — all existing verb functions keep working
    if (type === 'item')    lastItem    = id;
    if (type === 'scenery') lastScenery = id;
  }

  // ── Area membership tables ────────────────────────────────────────────────
  const AREA_ITEMS = {
    desk:    ['billboard', 'tmz flyer', 'pens', 'pen', 'floppy'],
    kitchen: ['mug', 'glass', 'scrapple', 'knife', 'coffee can',
              'filter box', 'filter', 'half and half'],
  };
  const AREA_SCENERY = {
    desk:    ['desk', 'drawer', 'pc', 'computer', 'monitor', 'printer'],
    kitchen: ['fridge', 'refrigerator', 'stove', 'counter', 'cabinet',
              'sink', 'coffee maker', 'coffee pot', 'kitchen drawer'],
    shelf:   ['record shelf', 'shelf', 'turntable'],
    ne:      ['boombox', 'cassette shelf', 'cassette rack'],
    north:   ['bookshelf', 'bookshelves', 'vhs shelf', 'phone',
              'answering machine', 'small table'],
    sofa:    ['sofa', 'couch'],
  };

  function areaOf(id) {
    for (const [area, ids] of Object.entries(AREA_ITEMS))
      if (ids.includes(id)) return area;
    for (const [area, names] of Object.entries(AREA_SCENERY))
      if (names.some(n => id === n || id.startsWith(n.split(' ')[0]))) return area;
    return null;
  }

  // Maps an item id to its home area using ITEMS container properties
  // (more accurate than the static table for dynamic item placement).
  function homeAreaOf(id) {
    if (gInventory.includes(id)) return null;  // in hand — no fixed home
    const it = ITEMS.find(i => i.id === id);
    if (it) {
      if (it.onDesk  || it.inDrawer)                                return 'desk';
      if (it.inCabinet || it.onCounter ||
          it.inFridge  || it.inKitchenDrawer)                       return 'kitchen';
      if (it.shelved)                                               return 'shelf';
      if (it.shelvedTape)                                           return 'ne';
      if (it.shelvedBook || it.shelvedVHS)                          return 'north';
    }
    return areaOf(id);
  }

  // ── Verb → semantic fitness checks ────────────────────────────────────────
  // Given an id and a verb, returns true if the id is a plausible target.
  // Used by resolveIt() to prefer a contextually sensible resolution over
  // whatever happened to be the last regex match.
  const VERB_CHECKS = {
    open:       id => /drawer|fridge|refrigerator|cabinet|box|door/.test(id),
    close:      id => /drawer|fridge|refrigerator|cabinet|box|door/.test(id),
    read:       id => /floppy|disk|billboard|flyer|book|note|letter|magazine|poster/.test(id),
    play:       id => ITEMS.some(i => (i.shelved || i.shelvedTape || i.shelvedVHS) && i.id === id),
    take:       id => ITEMS.some(i => i.id === id && !i.hidden),
    get:        id => ITEMS.some(i => i.id === id && !i.hidden),
    grab:       id => ITEMS.some(i => i.id === id && !i.hidden),
    drop:       id => gInventory.includes(id),
    examine:    _  => true,
    x:          _  => true,
    drink:      id => /beer|lager|coffee|mug|glass|water|cup/.test(id),
    eat:        id => /scrapple|food/.test(id),
    cook:       id => /scrapple/.test(id),
    insert:     id => /floppy|disk|cassette|tape|vhs/.test(id),
    eject:      id => /floppy|disk|cassette|tape|vhs/.test(id),
    'turn on':  id => /tv|lamp|stove|vcr|boombox|light/.test(id),
    'turn off': id => /tv|lamp|stove|vcr|boombox|light/.test(id),
  };

  // ── Pronoun resolution via FocusStack ─────────────────────────────────────
  // Walks the stack from the top, returning the first entry where the verb
  // semantically fits. Falls back to the raw top of the stack if nothing
  // passes the fitness check, and finally to the legacy lastItem/lastScenery.
  function resolveIt(verb) {
    const check = VERB_CHECKS[verb];
    for (const entry of focusStack) {
      if (!check || check(entry.id)) return entry.id;
      // Scan children of a focused scenery (e.g. desk exposes billboard, floppy …)
      for (const child of (entry.children || [])) {
        if (!check || check(child)) return child;
      }
    }
    return null;
  }

  function resolvePronouns(str, verb = '') {
    if (!/\b(it|that|this|one|them)\b/.test(str)) return str;
    const resolved = resolveIt(verb) || lastItem || lastScenery;
    if (!resolved) return str;
    return str.replace(/\b(it|that|this|one|them)\b/g, resolved);
  }

  // ── Disambiguation ────────────────────────────────────────────────────────
  // Scores each candidate by recency in ActionHistory, position in FocusStack,
  // area proximity, and verb fitness. Returns the winner if one is clearly
  // ahead; returns null if candidates are tied (caller should ask).
  function disambiguate(verb, candidates) {
    if (!candidates.length) return null;
    if (candidates.length === 1) return candidates[0];

    const check = VERB_CHECKS[verb];
    const scored = candidates.map(id => {
      let score = 0;
      actionHistory.slice().reverse().forEach((h, i) => {
        if (h.object && h.object.includes(id)) score += HISTORY_MAX - i;
      });
      focusStack.forEach((f, i) => {
        if (f.id === id)                             score += (FOCUS_MAX - i) * 2;
        if (f.children && f.children.includes(id))   score +=  FOCUS_MAX - i;
      });
      const home = areaOf(id);
      if (home && home === playerArea)               score += 5;
      if (check && check(id))                        score += 3;
      return { id, score };
    });

    scored.sort((a, b) => b.score - a.score);
    if (scored[0].score > 0 && scored[0].score > scored[1].score) return scored[0].id;
    return null;
  }

  // ── Auto-navigation ───────────────────────────────────────────────────────
  // Moves the player to targetArea with a brief narrative transition.
  // Calls autoStand() if seated. Returns true if a move occurred.
  function autoNavigate(targetArea, msg) {
    if (playerArea === targetArea) return false;
    autoStand();
    playerArea = targetArea;
    const defaults = {
      desk:    'You walk back over to the desk.',
      kitchen: 'You step back into the kitchen.',
      shelf:   'You walk to the record shelf.',
      ne:      'You walk to the northeast corner.',
      north:   'You walk over to the north shelves.',
      sofa:    'You drift back toward the sofa.',
    };
    addLine(msg || defaults[targetArea] || 'You move over.');
    return true;
  }

  // canInteract: checks reachability of id from the current playerArea.
  // If autoMove is true (default), navigates there transparently and returns true.
  // Items in gInventory are always reachable regardless of area.
  function canInteract(id, autoMove = true) {
    if (!id) return true;
    if (gInventory.includes(id)) return true;
    const home = homeAreaOf(id);
    if (!home || home === playerArea) return true;
    if (autoMove) { autoNavigate(home); return true; }
    return false;
  }

  return {
    push:           pushHistory,
    get history()   { return actionHistory; },
    setFocus,
    get focus()     { return focusStack; },
    resolveIt,
    resolvePronouns,
    disambiguate,
    autoNavigate,
    canInteract,
    homeAreaOf,
    areaOf,
  };
})();

// ── GameState facade ───────────────────────────────────────────────────────
// Single named interface over the engine's global flags. Existing code reads
// and writes globals directly — this object provides a clean API for new code
// without a mass-rename of the ~200 existing references throughout the file.
const GameState = {
  get lampOn()            { return lampOn; },            set lampOn(v)            { lampOn = v; },
  get tvOn()              { return tvOn; },              set tvOn(v)              { tvOn = v; },
  get recordPlaying()     { return recordPlaying; },     set recordPlaying(v)     { recordPlaying = v; },
  get mugFilled()         { return mugFilled; },         set mugFilled(v)         { mugFilled = v; },
  get mugHasHalf()        { return mugHasHalf; },        set mugHasHalf(v)        { mugHasHalf = v; },
  get coffeePotState()    { return coffeePotState; },    set coffeePotState(v)    { coffeePotState = v; },
  get seated()            { return seated; },            set seated(v)            { seated = v; },
  get fridgeOpen()        { return fridgeOpen; },        set fridgeOpen(v)        { fridgeOpen = v; },
  get drawerOpen()        { return drawerOpen; },        set drawerOpen(v)        { drawerOpen = v; },
  get cabinetOpen()       { return cabinetOpen; },       set cabinetOpen(v)       { cabinetOpen = v; },
  get kitchenDrawerOpen() { return kitchenDrawerOpen; }, set kitchenDrawerOpen(v) { kitchenDrawerOpen = v; },
  get stoveOn()           { return stoveOn; },           set stoveOn(v)           { stoveOn = v; },
  get scrappleInPan()     { return scrappleInPan; },     set scrappleInPan(v)     { scrappleInPan = v; },
  get scrappleCooked()    { return scrappleCooked; },    set scrappleCooked(v)    { scrappleCooked = v; },
  get playerArea()        { return playerArea; },        set playerArea(v)        { playerArea = v; },
  get floppyInserted()    { return floppyInserted; },    set floppyInserted(v)    { floppyInserted = v; },
  get floppyRead()        { return floppyRead; },        set floppyRead(v)        { floppyRead = v; },
  get cassettePlaying()   { return cassettePlaying; },   set cassettePlaying(v)   { cassettePlaying = v; },
  get vhsPlaying()        { return vhsPlaying; },        set vhsPlaying(v)        { vhsPlaying = v; },
  get vhsPlayingId()      { return vhsPlayingId; },      set vhsPlayingId(v)      { vhsPlayingId = v; },
  get boomBoxOn()         { return boomBoxOn; },         set boomBoxOn(v)         { boomBoxOn = v; },
  get vcrOn()             { return vcrOn; },             set vcrOn(v)             { vcrOn = v; },
  get messageHeard()      { return messageHeard; },      set messageHeard(v)      { messageHeard = v; },
  get lastItem()               { return lastItem; },               set lastItem(v)               { lastItem = v; },
  get lastScenery()            { return lastScenery; },            set lastScenery(v)            { lastScenery = v; },
  get pendingVerb()            { return pendingVerb; },            set pendingVerb(v)            { pendingVerb = v; },
  get mugHasFreshCoffee()      { return mugHasFreshCoffee; },      set mugHasFreshCoffee(v)      { mugHasFreshCoffee = v; },
  get glassFilled()            { return glassFilled; },            set glassFilled(v)            { glassFilled = v; },
  get farted()                 { return farted; },                 set farted(v)                 { farted = v; },
  get ejectNudged()            { return ejectNudged; },            set ejectNudged(v)            { ejectNudged = v; },
  get brewChecked()            { return brewChecked; },            set brewChecked(v)            { brewChecked = v; },
  get coffeeCanOpen()          { return coffeeCanOpen; },          set coffeeCanOpen(v)          { coffeeCanOpen = v; },
  get awaitingFloppyPass()     { return awaitingFloppyPass; },     set awaitingFloppyPass(v)     { awaitingFloppyPass = v; },
  get awaitingSitTarget()      { return awaitingSitTarget; },      set awaitingSitTarget(v)      { awaitingSitTarget = v; },
  get floppyUnlocked()         { return floppyUnlocked; },         set floppyUnlocked(v)         { floppyUnlocked = v; },
  get floppyDecryptedContent() { return floppyDecryptedContent; }, set floppyDecryptedContent(v) { floppyDecryptedContent = v; },
  get gInventory()             { return gInventory; },
  get focus()                  { return ContextManager.focus; },
  get history()                { return ContextManager.history; },

  // Reset all mutable game flags to their start-of-game values.
  // Called by startAdventure() — single source of truth for initial state.
  reset() {
    gInventory          = [];
    gHistory            = [];
    gHistIdx            = -1;
    lampOn              = true;
    tvOn                = false;
    recordPlaying       = null;
    cabinetOpen         = false;
    mugFilled           = false;
    mugHasHalf          = false;
    mugHasFreshCoffee   = false;
    glassFilled         = false;
    farted              = false;
    seated              = false;
    boomBoxOn           = false;
    cassettePlaying     = null;
    fridgeOpen          = false;
    drawerOpen          = false;
    floppyInserted      = false;
    messageHeard        = false;
    floppyRead          = false;
    ejectNudged         = false;
    vcrOn               = false;
    vhsPlaying          = null;
    vhsPlayingId        = null;
    floppyDecryptedContent = null;
    awaitingFloppyPass  = false;
    awaitingSitTarget   = false;
    pendingVerb         = null;
    lastItem            = null;
    lastScenery         = null;
    floppyUnlocked      = false;
    kitchenDrawerOpen   = false;
    coffeeCanOpen       = false;
    stoveOn             = false;
    scrappleInPan       = false;
    scrappleCooked      = false;
    coffeePotState      = 'old';
    brewChecked         = false;
    playerArea          = null;
    // Reset item state from their cached originals
    for (const it of ITEMS) {
      it.hidden          = it._origHidden;
      it.inCabinet       = it._origInCabinet;
      it.inFridge        = it._origInFridge;
      it.inDrawer        = it._origInDrawer;
      it.inKitchenDrawer = it._origInKitchenDrawer;
      it.onCounter       = it._origOnCounter;
      it.label           = it._origLabel;
      it.examDesc        = it._origExamDesc;
      it.examThought     = it._origExamThought;
      it.takeNote        = it._origTakeNote;
      it._used           = false;
      it.dropped         = false;
    }
    // Clear context history so a new session starts fresh
    ContextManager.focus.length   = 0;
    ContextManager.history.length = 0;
  },

  // Serialize all mutable flags to a plain object for save/restore.
  serialize() {
    return {
      gInventory, lampOn, tvOn, recordPlaying, cabinetOpen,
      mugFilled, mugHasHalf, mugHasFreshCoffee, glassFilled, farted,
      seated, boomBoxOn, cassettePlaying, fridgeOpen, drawerOpen,
      floppyInserted, messageHeard, floppyRead, ejectNudged,
      vcrOn, vhsPlaying, vhsPlayingId, floppyDecryptedContent,
      awaitingFloppyPass, awaitingSitTarget, pendingVerb,
      lastItem, lastScenery, floppyUnlocked, kitchenDrawerOpen,
      coffeeCanOpen, stoveOn, scrappleInPan, scrappleCooked,
      coffeePotState, brewChecked, playerArea,
      items: ITEMS.map(it => ({
        id: it.id, hidden: it.hidden, inCabinet: it.inCabinet,
        inFridge: it.inFridge, inDrawer: it.inDrawer,
        inKitchenDrawer: it.inKitchenDrawer, onCounter: it.onCounter,
        dropped: it.dropped, _used: it._used,
      })),
    };
  },

  // Restore from a serialized snapshot.
  restore(snap) {
    ({
      gInventory, lampOn, tvOn, recordPlaying, cabinetOpen,
      mugFilled, mugHasHalf, mugHasFreshCoffee, glassFilled, farted,
      seated, boomBoxOn, cassettePlaying, fridgeOpen, drawerOpen,
      floppyInserted, messageHeard, floppyRead, ejectNudged,
      vcrOn, vhsPlaying, vhsPlayingId, floppyDecryptedContent,
      awaitingFloppyPass, awaitingSitTarget, pendingVerb,
      lastItem, lastScenery, floppyUnlocked, kitchenDrawerOpen,
      coffeeCanOpen, stoveOn, scrappleInPan, scrappleCooked,
      coffeePotState, brewChecked, playerArea,
    } = snap);
    for (const s of snap.items) {
      const it = ITEMS.find(i => i.id === s.id);
      if (!it) continue;
      Object.assign(it, {
        hidden: s.hidden, inCabinet: s.inCabinet, inFridge: s.inFridge,
        inDrawer: s.inDrawer, inKitchenDrawer: s.inKitchenDrawer,
        onCounter: s.onCounter, dropped: s.dropped, _used: s._used,
      });
    }
  },
};

// ── Helpers ───────────────────────────────────────────────────────────────
function addLine(text = '', cls = '') {
  const span = document.createElement('span');
  span.className = 'line' + (cls ? ' ' + cls : '');
  span.textContent = text;
  outputEl.appendChild(span);
  outputEl.scrollTop = outputEl.scrollHeight;
  return span;
}

function clearOutput() { outputEl.innerHTML = ''; }

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

// ── Crypto helpers ────────────────────────────────────────────────────────
async function deriveKey(password, salt) {
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decryptLetter(password, b64) {
  const blob = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt  = blob.slice(0, 16);
  const iv    = blob.slice(16, 28);
  const ct    = blob.slice(28);
  const key   = await deriveKey(password, salt);
  const pt    = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}

// ── Path helpers ───────────────────────────────────────────────────────────
function normPath(p) {
  const parts = p.split('/').filter(Boolean);
  const out = [];
  for (const seg of parts) {
    if (seg === '..') { if (out.length) out.pop(); }
    else if (seg !== '.') out.push(seg);
  }
  return '/' + out.join('/');
}

// Expand ~ at start of path, then resolve relative to cwd
function resolvePath(arg) {
  if (!arg || arg === '.') return cwd;
  if (arg === '~')         return CONFIG.HOME;
  if (arg.startsWith('~/')) return normPath(CONFIG.HOME + '/' + arg.slice(2));
  if (arg.startsWith('/'))  return normPath(arg);
  return normPath(cwd + '/' + arg);
}

// Direct children of dirPath (one level only)
function children(dirPath, showHidden = false) {
  const prefix = dirPath === '/' ? '/' : dirPath + '/';
  return Object.keys(FS)
    .filter(k => {
      if (k === dirPath) return false;
      if (!k.startsWith(prefix)) return false;
      const rest = k.slice(prefix.length);
      if (rest.includes('/')) return false;
      if (!showHidden && FS[k].hidden) return false;
      return true;
    })
    .sort();  // alphabetical, like real ls
}

// ── Status panel ──────────────────────────────────────────────────────────
function cwdDisplay() {
  return cwd.startsWith(CONFIG.HOME)
    ? '~' + cwd.slice(CONFIG.HOME.length)
    : cwd;
}

function updatePanel() {
  panelEl.innerHTML =
    `<span>────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────</span>\n` +
    `<span><span class="norm">  West Philly Simulator 93  BETA</span></span>\n` +
    `<span>────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────</span>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────
function boot() {
  currentUser = CONFIG.LOGIN_USER;
  cwd         = CONFIG.HOME;
  updatePanel();

  for (const line of MOTD.trim().split('\n')) addLine(line, 'dim');
  addLine('');

  state = 'shell';
  showPrompt();
  inputEl.focus();
}

// ── Shell prompt ───────────────────────────────────────────────────────────
function showPrompt() {
  promptEl.textContent = '$ ';
  inputEl.disabled = false;
  inputEl.value = '';
  updatePanel();
}

// ── Pager ──────────────────────────────────────────────────────────────────
const PAGE = 22;

function startMore(lines, returnState) {
  prevState = returnState || 'shell';
  moreBuf   = [...lines];
  outputMore();
}

function outputMore() {
  const chunk = moreBuf.splice(0, PAGE);
  for (const l of chunk) addLine(l);
  if (moreBuf.length > 0) {
    addLine('--More-- (press SPACE or ENTER, q to quit)', 'dim');
    state = 'more';
    promptEl.textContent = '';
    inputEl.value = '';
  }
}

// ── Commands ───────────────────────────────────────────────────────────────

function cmdLs(rawArgs) {
  let showHidden = false;
  let long       = false;
  const targets  = [];

  for (const a of rawArgs) {
    if (a.startsWith('-')) {
      if (a.includes('a')) showHidden = true;
      if (a.includes('l')) long       = true;
    } else {
      targets.push(a);
    }
  }

  // Default to cwd if no paths given
  const paths = targets.length ? targets.map(t => ({ arg: t, path: resolvePath(t) }))
                                : [{ arg: null, path: cwd }];

  for (const { arg, path } of paths) {
    const node = FS[path];
    if (!node) {
      addLine(`ls: ${arg}: No such file or directory`, 'err');
      continue;
    }

    if (node.type === 'file') {
      addLine(long ? fmtLong(path, node) : path.split('/').pop());
      continue;
    }

    // Directory
    if (paths.length > 1) addLine(`${path}:`);   // heading when listing multiple dirs

    const kids = children(path, showHidden);

    if (long) {
      const total = kids.reduce((n, k) => n + Math.ceil((FS[k].size || 0) / 512), 0);
      addLine(`total ${total}`);
      if (showHidden) {
        addLine(fmtLong(path, node, '.'));
        const parentPath = normPath(path + '/..');
        const parentNode = FS[parentPath] || node;
        addLine(fmtLong(parentPath, parentNode, '..'));
      }
      for (const k of kids) addLine(fmtLong(k, FS[k]));
    } else {
      if (kids.length) addLine(kids.map(k => k.split('/').pop()).join('  '));
    }

    if (paths.length > 1) addLine('');
  }
}

function fmtLong(path, node, nameOverride) {
  const name    = nameOverride || path.split('/').pop();
  const nlinks  = node.type === 'dir' ? 2 : 1;
  return `${node.perms}  ${String(nlinks).padStart(3)} ${node.owner.padEnd(8)} ${node.group.padEnd(8)} ${String(node.size).padStart(6)} ${node.mtime} ${name}`;
}

function cmdCat(args) {
  if (!args.length) { addLine('usage: cat file ...', 'dim'); return; }
  for (const a of args) {
    const path = resolvePath(a);
    const node = FS[path];
    if (!node)                              { addLine(`cat: ${a}: No such file or directory`, 'err'); continue; }
    if (node.type === 'dir')                { addLine(`cat: ${a}: Is a directory`, 'err');            continue; }
    for (const line of (node.content || '').split('\n')) addLine(line);
  }
}

function cmdMore(args) {
  if (!args.length) { addLine('usage: more file ...', 'dim'); return; }
  const a    = args[0];
  const path = resolvePath(a);
  const node = FS[path];
  if (!node)                        { addLine(`more: ${a}: No such file or directory`, 'err'); return; }
  if (node.type === 'dir')          { addLine(`more: ${a}: Is a directory`, 'err');            return; }
  startMore((node.content || '').split('\n'), state);
}

function cmdCd(args) {
  const target = args[0] || '~';
  const path   = resolvePath(target);
  const node   = FS[path];
  if (!node)                 { addLine(`cd: ${target}: No such file or directory`, 'err'); return; }
  if (node.type !== 'dir')   { addLine(`cd: ${target}: Not a directory`, 'err');           return; }
  cwd = path;
  updatePanel();
}

function cmdPwd()    { addLine(cwd); }
function cmdWhoami() { addLine(currentUser || 'nobody'); }
function cmdDate()   { addLine(CONFIG.BOOT_DATE); }
function cmdEcho(args) { addLine(args.join(' ')); }

function cmdUname(args) {
  if (args.includes('-a')) addLine('SunOS localhost 4.1.3 1 sun4m');
  else                     addLine('SunOS');
}

function cmdFinger(args) {
  const target = args[0] || CONFIG.LOGIN_USER;
  const home   = CONFIG.HOME;
  const plan   = FS[home + '/.plan'];

  // Only know about the local user
  if (target !== CONFIG.LOGIN_USER) {
    addLine(`finger: ${target}: no such user.`, 'err');
    return;
  }
  addLine(`Login: ${CONFIG.LOGIN_USER.padEnd(32)} Name: ${CONFIG.LOGIN_USER}`);
  addLine(`Directory: ${home.padEnd(24)} Shell: /usr/ucb/csh`);
  addLine(`On since ${CONFIG.BOOT_DATE} on console`);
  if (plan) {
    addLine('Plan:');
    for (const l of plan.content.split('\n')) addLine(l);
  }
}

function cmdFile(args) {
  if (!args.length) { addLine('usage: file name ...', 'dim'); return; }
  for (const a of args) {
    const path = resolvePath(a);
    const node = FS[path];
    if (!node)               { addLine(`${a}: cannot open`, 'err'); continue; }
    if (node.type === 'dir') { addLine(`${a}: directory`);          continue; }
    // Guess type from perms and content
    const content = node.content || '';
    if (node.perms.includes('x') || content.startsWith('#!'))
      addLine(`${a}: commands text`);
    else
      addLine(`${a}: ascii text`);
  }
}

// ── Command dispatch ────────────────────────────────────────────────────────
function handleCommand(raw) {
  // Always echo and show a new prompt — even for empty Enter
  addLine(promptEl.textContent + raw, 'hi');

  const trimmed = raw.trim();
  if (!trimmed) { addLine(''); showPrompt(); return; }

  // Record history (skip duplicates)
  if (history[history.length - 1] !== trimmed) history.push(trimmed);
  histIdx = -1;

  // Split preserving original case for arguments; lowercase only the verb
  const tokens  = trimmed.split(/\s+/);
  const cmdRaw  = tokens[0];
  const cmdLow  = cmdRaw.toLowerCase();
  const args    = tokens.slice(1);

  switch (cmdLow) {
    case 'ls':      cmdLs(args);      break;
    case 'cat':     cmdCat(args);     break;
    case 'more':
    case 'less':    cmdMore(args);    break;
    case 'cd':      cmdCd(args);      break;
    case 'pwd':     cmdPwd();         break;
    case 'whoami':  cmdWhoami();      break;
    case 'date':    cmdDate();        break;
    case 'uname':   cmdUname(args);   break;
    case 'finger':  cmdFinger(args);  break;
    case 'file':    cmdFile(args);    break;
    case 'echo':    cmdEcho(args);    break;
    case 'clear': case 'cls':  clearOutput(); boot(); return;
    case 'help':
    case '?':       cmdHelp();        break;
    case 'logout':
    case 'exit':
    case 'bye':     cmdLogout();      return;
    case 'buckingham': startAdventure(); return;
    case 'vi':
    case 'emacs':
    case 'pico':
      addLine(`${cmdRaw}: editor not available in this environment`, 'dim');
      break;
    case 'man':
      addLine(args.length ? `No manual entry for ${args[0]}` : 'What manual page do you want?', 'dim');
      break;
    default: {
      // Check absolute path (e.g. /mnt/floppy/letters)
      const absNode = cmdRaw.startsWith('/') ? FS[normPath(cmdRaw)] : null;
      // Check relative / . in PATH
      const localPath = resolvePath(cmdRaw);
      const localNode = absNode || FS[localPath];
      const targetPath = absNode ? normPath(cmdRaw) : localPath;

      if (localNode && localNode.type === 'file' && localNode.perms.includes('x')) {
        addLine(`${cmdRaw}: executed.`, 'dim');
      } else if (FS[localPath] && FS[localPath].type === 'dir') {
        addLine(`${cmdRaw}: is a directory`, 'err');
      } else {
        addLine(`${cmdRaw}: Command not found.`, 'err');
      }
    }
  }

  addLine('');
  showPrompt();
}
